<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(${eventId != null} ? 'Edit Event' : 'Create Event')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container mt-4">
    <h2 th:text="${eventId != null} ? 'Edit Event' : 'Create New Event'">Form</h2>
    <hr>

    <form th:action="${eventId != null}
                          ? @{/clubs/{cId}/events/{eId}(cId=${clubId}, eId=${eventId})}
                          : @{/clubs/{cId}/events(cId=${clubId})}"
          th:method="${eventId != null} ? 'put' : 'post'"
          th:object="${eventRequest}" class="needs-validation">

        <div th:if="${#fields.hasErrors('global')}" class="alert alert-danger" th:errors="*{global}"></div>

        <div class="mb-3">
            <label class="form-label">Event Name*</label>
            <input type="text" th:field="*{name}" class="form-control"
                   th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'">
            <div class="invalid-feedback" th:errors="*{name}">Name error</div>
        </div>

        <div class="mb-3">
            <label class="form-label">Date*</label>
            <input type="date" th:field="*{date}" class="form-control"
                   th:classappend="${#fields.hasErrors('date')} ? 'is-invalid'">
            <div class="invalid-feedback" th:errors="*{date}">Date error</div>
        </div>

        <div class="mb-3">
            <label class="form-label">Type*</label>
            <select th:field="*{type}" class="form-select"
                    th:classappend="${#fields.hasErrors('type')} ? 'is-invalid'">
                <option value="">Select type...</option>
                <option th:each="t : ${T(pt.unl.fct.iadi.novaevents.model.EventType).values()}"
                        th:value="${t}" th:text="${t}"></option>
            </select>
            <div class="invalid-feedback" th:errors="*{type}">Type error</div>
        </div>

        <div class="mb-3">
            <label class="form-label">Location</label>
            <input type="text" id="location" th:field="*{location}" class="form-control"
                   th:classappend="${#fields.hasErrors('location')} ? 'is-invalid'">
            <div class="invalid-feedback" th:errors="*{location}">Location error</div>
            <div class="mt-2 d-flex gap-2 align-items-center flex-wrap">
                <button type="button" id="check-weather-js" class="btn btn-outline-info btn-sm">
                    Check Weather JS
                </button>
                <button type="button"
                        class="btn btn-outline-info btn-sm"
                        hx-get="/api/weather"
                        hx-include="[name='location']"
                        hx-trigger="click"
                        hx-target="#weather-result"
                        hx-swap="innerHTML">
                    Check Weather HTMX
                </button>
                <span id="weather-result" class="ms-2"></span>
            </div>
        </div>
        <script>
            document.addEventListener('DOMContentLoaded', function () {
                const btn = document.getElementById('check-weather-js');
                if (!btn) return;
                btn.addEventListener('click', async function () {
                    const loc = document.getElementById('location').value;
                    const out = document.getElementById('weather-result');
                    if (!loc) { out.innerHTML = '<span class="badge bg-secondary">Enter a location first</span>'; return; }
                    try {
                        const r = await fetch('/api/weather?location=' + encodeURIComponent(loc), {
                            headers: { 'Accept': 'application/json' }
                        });
                        if (!r.ok) {
                            out.innerHTML = '<span class="badge bg-secondary">Weather unavailable</span>';
                            return;
                        }
                        const data = await r.json();
                        if (data.raining === null) {
                            out.innerHTML = '<span class="badge bg-secondary">Weather unavailable for ' + loc + '</span>';
                        } else if (data.raining) {
                            out.innerHTML = '<span class="badge bg-warning text-dark">It is raining at ' + loc + '</span>';
                        } else {
                            out.innerHTML = '<span class="badge bg-success">Clear skies at ' + loc + '</span>';
                        }
                    } catch (e) {
                        out.innerHTML = '<span class="badge bg-secondary">Weather unavailable</span>';
                    }
                });
            });
        </script>

        <div class="mb-3">
            <label class="form-label">Description</label>
            <textarea th:field="*{description}" class="form-control" rows="3"></textarea>
        </div>

        <div class="mt-4">
            <button type="submit" class="btn btn-primary"
                    th:text="${eventId != null} ? 'Update Event' : 'Create Event'"></button>
            <a th:href="@{/clubs/{id}(id=${clubId})}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>

<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
