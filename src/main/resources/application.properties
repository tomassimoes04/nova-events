spring.application.name=nova-events
spring.mvc.hiddenmethod.filter.enabled=true

# H2 in-memory database
spring.datasource.url=jdbc:h2:mem:novaevents;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# JWT
jwt.secret=nova-events-secret-key-must-be-at-least-256-bits-long-for-hs256-security
jwt.expiration=86400000
spring.jpa.open-in-view=false

# OpenWeatherMap
weather.api.key=REPLACE_WITH_YOUR_OPENWEATHER_KEY
weather.api.url=https://api.openweathermap.org
